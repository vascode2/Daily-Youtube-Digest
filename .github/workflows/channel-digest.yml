name: '[MANUAL] Channel YouTube Digest'

# On-demand: summarize the most recent N videos from a single YouTube channel.
# Trigger from the Actions tab → "Run workflow" → enter channel handle.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'YouTube channel handle (e.g. @unrealtech)'
        required: true
        type: string
      limit:
        description: 'How many recent videos to summarize'
        required: false
        type: string
        default: '10'

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install yt-dlp (latest GitHub release)
        run: |
          sudo curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect videos from single channel
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
          DIGEST_TIMEZONE: America/New_York
        run: |
          node --env-file-if-exists=.env scripts/collect.js \
            --channel "${{ inputs.channel }}" \
            --limit "${{ inputs.limit }}"

      - name: Summarize via Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --print --dangerously-skip-permissions --model claude-haiku-4-5-20251001 \
            "CI MODE — ONLY DO STEP 2 OF THE PIPELINE. Do NOT run any npm commands. Do NOT write to output/. Do NOT trigger review or publish. Ignore CLAUDE.md's full-pipeline instructions; the workflow handles those.

            Your single job:
            1. Find the latest tmp/raw-channel-*.json file (single-channel mode).
            2. Read it. Read config/format.md and agents/summarizer.md.
            3. Write a summary file to tmp/summaries-<KEY>.md where <KEY> matches the raw filename (e.g., raw-channel-unrealtech-2026-05-02.json → summaries-channel-unrealtech-2026-05-02.md).

            Format requirements (strict):
            - First line: '# Channel Digest — <KEY>'
            - Group by channel using the channelName field under '### 📺 ChannelName' h3 headers.
            - Each video title MUST be h2 with clickable YouTube link: '## [Title](https://www.youtube.com/watch?v=VIDEO_ID)'.
            - DO NOT include upload dates, view counts, duration, or transcript indicators.
            - Sections per video: 핵심 요약 (>quote), 주요 타임라인 (only if hasTranscript=true), 한 줄 인사이트 (💡 emoji).
            - Separator '---' between videos.

            STOP immediately after writing tmp/summaries-<KEY>.md."

      - name: Review summaries
        run: npm run review || echo "Review had warnings but not blocking"

      - name: Publish to Notion + repo
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          DIGEST_TIMEZONE: America/New_York
        run: npm run publish

      - name: Commit output back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No new digest output to commit."
            exit 0
          fi
          git commit -m "Auto: channel digest ${{ inputs.channel }} $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "Push failed after 3 retries"; exit 1
