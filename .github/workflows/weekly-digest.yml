name: '[MANUAL] Weekly YouTube Digest'

on:
  # Auto-cron disabled — daily digest covers everything cumulatively.
  # Manual run still available via workflow_dispatch.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 영상 30+개 처리 가능 시간
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install yt-dlp (latest GitHub release)
        run: |
          sudo curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect last 7 days
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
          DIGEST_TIMEZONE: America/New_York   # User in EST/EDT
        run: npm run collect:week

      - name: Summarize via Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --print --dangerously-skip-permissions --model claude-haiku-4-5-20251001 \
            "CI MODE — ONLY DO STEP 2 OF THE PIPELINE. Do NOT run any npm commands. Do NOT write to output/. Do NOT trigger review or publish. Ignore CLAUDE.md's full-pipeline instructions; the workflow handles those.

            Your single job:
            1. Find the latest tmp/raw-*_to_*.json file (7-day range).
            2. Read it. Read config/format.md and agents/summarizer.md — these are the SOURCE OF TRUTH for output format. Follow them exactly.
            3. Write a summary file to tmp/summaries-<KEY>.md where <KEY> matches the raw filename.

            Hard requirements (in addition to format.md):
            - First line: '# YouTube Digest — <KEY>'
            - Channel header MUST be a hyperlink: '### 📺 [ChannelName](https://www.youtube.com/<channel-handle-from-raw>)'.
            - Each video title MUST be h2 with clickable YouTube link: '## [Title](https://www.youtube.com/watch?v=VIDEO_ID)'.
            - Section order per video: '한 줄 인사이트' → '핵심 요약' → '주요 타임라인'.
            - 핵심 요약 = 2–3 paragraphs separated by blank lines, NO blockquote '>' prefix, MUST include at least one concrete example/demo/case.
            - 주요 타임라인 lines MUST be hyperlinked: '- [HH:MM:SS](https://www.youtube.com/watch?v=VIDEO_ID&t=SECONDS) description'. Only emit when transcriptSegments exist; never invent timestamps.
            - DO NOT include upload dates, view counts, duration, or transcript indicators.
            - Separator '---' between videos.

            STOP immediately after writing tmp/summaries-<KEY>.md. Do not run any other commands."

      - name: Review summaries
        id: review
        continue-on-error: true
        run: npm run review

      - name: Publish to Notion + repo
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          DIGEST_TIMEZONE: America/New_York
        run: npm run publish

      - name: Commit output back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No new digest output to commit."
            exit 0
          fi
          git commit -m "Auto: weekly digest $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "Push failed after 3 retries"; exit 1

      - name: Fail workflow if review reported errors
        if: always() && steps.review.outcome == 'failure'
        run: |
          echo "::error::Review found quality issues — see the 'Review summaries' step above. Output was published anyway."
          exit 1
