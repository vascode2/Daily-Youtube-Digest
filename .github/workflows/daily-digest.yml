name: '[AUTO] Daily YouTube Digest'

on:
  schedule:
    # 11:00 UTC = 07:00 EDT (summer) / 06:00 EST (winter). Runs daily.
    - cron: '0 11 * * *'
  workflow_dispatch: {}  # Manual trigger from GitHub UI

permissions:
  contents: write  # output/ 커밋 권한

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install yt-dlp (latest GitHub release)
        run: |
          sudo curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Verify tools
        run: |
          node --version
          yt-dlp --version

      - name: Collect yesterday's videos
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
          DIGEST_TIMEZONE: America/New_York   # User in EST/EDT
        run: npm run collect

      - name: Summarize via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
          GEMINI_MODEL_FALLBACKS: gemini-3.5-flash,gemini-3.5-flash-lite,gemini-3-fast,gemini-3-flash,gemini-3.0-flash,gemini-3.0-flash-lite,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.0-flash,gemini-1.5-flash
        run: npm run summarize

      - name: Review summaries
        id: review
        continue-on-error: true
        run: npm run review

      - name: Publish to Notion + repo
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          DIGEST_TIMEZONE: America/New_York
        run: npm run publish

      - name: Commit output back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No new digest output to commit."
            exit 0
          fi
          git commit -m "Auto: daily digest $(date -u +%Y-%m-%d)"
          # Retry up to 3 times in case remote moved while we were running
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "Push failed after 3 retries"; exit 1
